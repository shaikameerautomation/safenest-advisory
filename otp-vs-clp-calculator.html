<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafeNest — OTP vs CLP Calculator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background:#111;">
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const C = {gold:"#C9A84C",s1:"#1a1a1a",s2:"#242424",border:"#333",text:"#e8e8e8",muted:"#888",amber:"#E67E22",green:"#27AE60"};
const inp = {width:"100%",background:C.s2,border:`1px solid ${C.border}`,borderRadius:7,padding:"9px 12px",color:C.text,fontSize:13,marginBottom:12,fontFamily:"inherit",display:"block",outline:"none",boxSizing:"border-box"};
const lbl = {fontSize:10,color:C.muted,fontWeight:600,letterSpacing:0.5,textTransform:"uppercase",marginBottom:5,display:"block"};

function Field({label,hint,children}){return(<div style={{marginBottom:2}}><span style={lbl}>{label}</span>{children}{hint&&<div style={{fontSize:10,color:"#555",marginTop:-8,marginBottom:8}}>{hint}</div>}</div>);}
function Row({label,value,positive,highlight,bold,sub}){
  return(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"5px 0",borderBottom:`1px solid ${C.border}`}}>
      <div><span style={{fontSize:12,color:C.muted}}>{label}</span>{sub&&<div style={{fontSize:10,color:"#555"}}>{sub}</div>}</div>
      <span style={{fontSize:13,fontWeight:bold?600:400,color:positive?C.green:highlight?C.amber:C.text,flexShrink:0,marginLeft:8}}>{value}</span>
    </div>
  );
}

function App(){
  const [f,setF]=useState({projectName:"",allInCLP:"",otpDiscount:8,handoverMonths:30,loanPct:80,interestRate:8.5,opportunityRate:7});
  const [result,setResult]=useState(null);
  const upd=(k,v)=>setF(p=>({...p,[k]:v}));

  const calculate=()=>{
    const clpP=parseFloat(f.allInCLP)||0;
    const disc=parseFloat(f.otpDiscount)/100;
    const months=parseFloat(f.handoverMonths)||0;
    const loanPct=parseFloat(f.loanPct)/100;
    const rate=parseFloat(f.interestRate)/100;
    const oppRate=parseFloat(f.opportunityRate)/100;
    const ownPct=1-loanPct;
    const clpLoan=clpP*loanPct,clpOwn=clpP*ownPct;
    const clpPreEmi=clpLoan*rate*0.55*(months/12);
    const clpOpp=clpOwn*oppRate*0.55*(months/12);
    const clpTotal=(clpP*100)+(clpPreEmi*100)+(clpOpp*100);
    const otpP=clpP*(1-disc);
    const otpLoan=otpP*loanPct,otpOwn=otpP*ownPct;
    const otpPreEmi=otpLoan*rate*(months/12);
    const otpOpp=otpOwn*oppRate*(months/12);
    const otpTotal=(otpP*100)+(otpPreEmi*100)+(otpOpp*100);
    const discSaving=(clpP-otpP)*100;
    const extraInt=(otpPreEmi-clpPreEmi)*100;
    const extraOpp=(otpOpp-clpOpp)*100;
    const net=discSaving-extraInt-extraOpp;
    const breakeven=(((extraInt+extraOpp)/(clpP*100))*100+parseFloat(f.otpDiscount)).toFixed(1);
    setResult({clp:{price:clpP,loan:clpLoan,own:clpOwn,preEmi:clpPreEmi,opp:clpOpp,total:clpTotal},otp:{price:otpP,loan:otpLoan,own:otpOwn,preEmi:otpPreEmi,opp:otpOpp,total:otpTotal},discSaving,extraInt,extraOpp,net,breakeven,winner:net>0?"OTP":"CLP"});
  };

  const fL=(n)=>`₹${Math.abs(n).toFixed(2)}L`;
  const fC=(n)=>`₹${(n*100).toFixed(2)}L`;

  return(
    <div style={{background:"#111",minHeight:"100vh",fontFamily:"'DM Sans',sans-serif",color:C.text,padding:24}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24,paddingBottom:16,borderBottom:`1px solid ${C.border}`}}>
        <div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,marginBottom:3}}>OTP vs CLP Calculator</div>
          <div style={{fontSize:12,color:C.muted}}>Is the builder's upfront discount actually worth it?</div>
        </div>
        <a href="index.html" style={{fontSize:12,color:C.muted,textDecoration:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 14px"}}>← Back to Suite</a>
      </div>
      <div style={{height:2,background:`linear-gradient(90deg,${C.gold},transparent)`,marginBottom:24,width:80}}/>
      <div style={{display:"grid",gridTemplateColumns:"300px 1fr",gap:20}}>
        <div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:10,padding:20,height:"fit-content"}}>
          <div style={{fontSize:11,color:C.gold,fontWeight:600,marginBottom:14}}>PROJECT DETAILS</div>
          <Field label="Project Name"><input style={inp} value={f.projectName} onChange={e=>upd("projectName",e.target.value)} placeholder="e.g. IRA Windermere"/></Field>
          <Field label="CLP All-Inclusive Price (₹ Cr)" hint="Full cost incl. GST & registration"><input style={inp} type="number" value={f.allInCLP} onChange={e=>upd("allInCLP",e.target.value)} placeholder="1.85"/></Field>
          <Field label="OTP Discount Offered (%)" hint="Builder's stated upfront discount"><input style={inp} type="number" value={f.otpDiscount} onChange={e=>upd("otpDiscount",e.target.value)} placeholder="8"/></Field>
          <div style={{borderTop:`1px solid ${C.border}`,margin:"4px 0 14px",paddingTop:14}}>
            <div style={{fontSize:11,color:C.gold,fontWeight:600,marginBottom:12}}>FINANCIAL ASSUMPTIONS</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="Handover (months)"><input style={inp} type="number" value={f.handoverMonths} onChange={e=>upd("handoverMonths",e.target.value)} placeholder="30"/></Field>
            <Field label="Loan %"><input style={inp} type="number" value={f.loanPct} onChange={e=>upd("loanPct",e.target.value)} placeholder="80"/></Field>
            <Field label="Loan Rate %"><input style={inp} type="number" value={f.interestRate} onChange={e=>upd("interestRate",e.target.value)} placeholder="8.5"/></Field>
            <Field label="Opp. Rate %" hint="FD/MF return on own funds"><input style={inp} type="number" value={f.opportunityRate} onChange={e=>upd("opportunityRate",e.target.value)} placeholder="7"/></Field>
          </div>
          <button onClick={calculate} style={{width:"100%",background:C.gold,border:"none",borderRadius:8,padding:12,color:"#000",fontSize:13,fontWeight:700,fontFamily:"inherit",cursor:"pointer",marginTop:4}}>Compare OTP vs CLP →</button>
        </div>
        {!result?(
          <div style={{background:C.s1,border:`1px dashed ${C.border}`,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",minHeight:360}}>
            <div style={{textAlign:"center",color:C.muted,fontSize:13}}>Enter project details and click Compare</div>
          </div>
        ):(
          <div>
            <div style={{background:"#1A1500",border:`2px solid ${C.gold}`,borderRadius:12,padding:"16px 22px",marginBottom:16,textAlign:"center"}}>
              <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>OTP vs CLP Verdict — {f.projectName||"This Project"}</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:600,color:result.winner==="OTP"?C.green:C.amber}}>
                {result.winner==="OTP"?`OTP saves ₹${Math.abs(result.net).toFixed(2)}L net`:`CLP is ₹${Math.abs(result.net).toFixed(2)}L cheaper`}
              </div>
              <div style={{fontSize:11,color:C.muted,marginTop:4}}>
                {result.winner==="OTP"?"Builder discount outweighs extra interest + opportunity cost":`Break-even discount needed: ${result.breakeven}% — builder offers only ${f.otpDiscount}%`}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
              {[{label:"CLP",color:"#5AAEFF",bg:"#0A1A2E",d:result.clp,w:result.winner==="CLP",isotp:false},{label:"OTP",color:"#5AFF8A",bg:"#1A2A0A",d:result.otp,w:result.winner==="OTP",isotp:true}].map((item,i)=>(
                <div key={i} style={{background:C.s1,border:`2px solid ${item.w?C.gold:C.border}`,borderRadius:10,padding:18,position:"relative"}}>
                  {item.w&&<div style={{position:"absolute",top:-10,left:"50%",transform:"translateX(-50%)",background:C.gold,color:"#000",fontSize:9,fontWeight:700,padding:"2px 10px",borderRadius:20,whiteSpace:"nowrap"}}>BETTER OPTION</div>}
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                    <div style={{background:item.bg,borderRadius:5,padding:"3px 9px",fontSize:11,fontWeight:700,color:item.color}}>{item.label}</div>
                    <span style={{fontSize:13}}>{item.label==="CLP"?"Construction-Linked":"One Time Payment"}</span>
                  </div>
                  <Row label="All-Inclusive Price" value={fC(item.d.price)} bold/>
                  {item.isotp&&<Row label={`Discount saved (${f.otpDiscount}%)`} value={`− ${fL(result.discSaving)}`} positive/>}
                  <Row label="Loan Amount" value={fC(item.d.loan)} sub={`${f.loanPct}% of price`}/>
                  <Row label="Pre-EMI Interest" value={`+ ${fC(item.d.preEmi)}`} highlight sub={item.isotp?"100% disbursed Day 1":"Stage-wise 55% avg"}/>
                  <Row label="Opportunity Cost" value={`+ ${fC(item.d.opp)}`} highlight sub={`Own funds at ${f.opportunityRate}% forgone`}/>
                  <div style={{marginTop:12,paddingTop:10,borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:12,color:C.gold,fontWeight:600}}>Total Economic Cost</span>
                    <span style={{fontSize:22,fontWeight:700,color:item.w?C.green:C.text,fontFamily:"'Cormorant Garamond',serif"}}>₹{item.d.total.toFixed(1)}L</span>
                  </div>
                </div>
              ))}
            </div>
            <div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:10,padding:18}}>
              <div style={{fontSize:11,color:C.gold,fontWeight:600,marginBottom:12}}>NET ANALYSIS</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:14}}>
                <div style={{background:"#0A2A0A",borderRadius:8,padding:12,textAlign:"center"}}>
                  <div style={{fontSize:9,color:"#5AFF8A",marginBottom:4,fontWeight:600}}>BUILDER DISCOUNT</div>
                  <div style={{fontSize:20,fontWeight:700,color:"#5AFF8A"}}>{fL(result.discSaving)}</div>
                  <div style={{fontSize:9,color:"#555",marginTop:3}}>Price saved on OTP</div>
                </div>
                <div style={{background:"#2A1A0A",borderRadius:8,padding:12,textAlign:"center"}}>
                  <div style={{fontSize:9,color:C.amber,marginBottom:4,fontWeight:600}}>EXTRA COST (OTP)</div>
                  <div style={{fontSize:20,fontWeight:700,color:C.amber}}>{fL(result.extraInt+result.extraOpp)}</div>
                  <div style={{fontSize:9,color:"#555",marginTop:3}}>Extra interest + opp cost</div>
                </div>
                <div style={{background:"#1A1500",borderRadius:8,padding:12,textAlign:"center"}}>
                  <div style={{fontSize:9,color:C.gold,marginBottom:4,fontWeight:600}}>NET ADVANTAGE</div>
                  <div style={{fontSize:20,fontWeight:700,color:result.net>0?C.green:C.amber}}>{result.net>0?"+":"−"}{fL(result.net)}</div>
                  <div style={{fontSize:9,color:"#555",marginTop:3}}>{result.winner} wins</div>
                </div>
              </div>
              <div style={{background:"#111",borderRadius:7,padding:"10px 14px",fontSize:11,color:C.muted,lineHeight:1.7}}>
                <span style={{color:C.gold,fontWeight:600}}>Advisor note: </span>
                {result.winner==="OTP"?`The ${f.otpDiscount}% discount saves ${fL(result.discSaving)}, exceeding extra interest + opportunity cost of ${fL(result.extraInt+result.extraOpp)}. OTP is genuinely better — confirm discount applies to all-inclusive pricing, not just base rate.`:`At ${f.otpDiscount}%, the builder discount doesn't offset full loan interest from Day 1 plus locked own-funds cost. CLP wins. Builder would need to offer ${result.breakeven}%+ for OTP to break even.`}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
