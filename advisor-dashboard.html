// ─── BUYER INTAKE ─────────────────────────────────────────────────────────────
function BuyerIntakeTab() {
  const [form, setForm] = useState({ name: "", phone: "", budget: "", microMarket: "All", segment: "All", purpose: [], bedrooms: [], nonNeg: [], concerns: "" });
  const [submitted, setSubmitted] = useState(false);
  const [selected, setSelected] = useState([]);

  const f = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const toggle = (k, v) => setForm(p => ({ ...p, [k]: p[k].includes(v) ? p[k].filter(x => x !== v) : [...p[k], v] }));

  const NON_NEG_OPTIONS = ["RERA Registered", "OC Received", "Tier 1 Developer", "Bank Approved", "No RED Flags", "Possession < 12 months"];

  const filtered = useMemo(() => {
    if (!submitted) return [];
    return PROJECTS.filter(p => {
      const budgetMatch = !form.budget || (p.priceMin <= parseFloat(form.budget) && p.priceMax >= parseFloat(form.budget) * 0.7);
      const mmMatch = form.microMarket === "All" || p.microMarket === form.microMarket;
      const segMatch = form.segment === "All" || p.segment === form.segment;
      const purposeMatch = form.purpose.length === 0 || form.purpose.some(pu => p.purpose.includes(pu));
      const nnMatch = !form.nonNeg.includes("OC Received") || p.stage === "OC Stage";
      const nnRera = !form.nonNeg.includes("RERA Registered") || true;
      const nnTier1 = !form.nonNeg.includes("Tier 1 Developer") || p.developer === "Prestige Group";
      const nnRed = !form.nonNeg.includes("No RED Flags") || p.flags.red === 0;
      const nnPossession = !form.nonNeg.includes("Possession < 12 months") || p.handoverMonths <= 12;
      return budgetMatch && mmMatch && segMatch && purposeMatch && nnMatch && nnRera && nnTier1 && nnRed && nnPossession;
    }).sort((a, b) => b.score - a.score);
  }, [submitted, form]);

  const toggleSelect = (id) => setSelected(p => p.includes(id) ? p.filter(x => x !== id) : p.length < 3 ? [...p, id] : p);

  return (
    <div>
      <SectionHeader title="Buyer Intake & Project Shortlist" subtitle="Enter buyer profile — matched projects surface instantly" />
      <div style={{ display: "grid", gridTemplateColumns: submitted && filtered.length > 0 ? "380px 1fr" : "1fr", gap: 24 }}>
        {/* FORM */}
        <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 28 }}>
          <Label>Buyer Name</Label>
          <Input value={form.name} onChange={v => f("name", v)} placeholder="e.g. Vikram Sharma" />
          <Label>Phone</Label>
          <Input value={form.phone} onChange={v => f("phone", v)} placeholder="10-digit mobile" />
          <Label>Budget (₹ Cr)</Label>
          <Input value={form.budget} onChange={v => f("budget", v)} placeholder="e.g. 1.5" type="number" />
          <Label>Micro-Market</Label>
          <Select value={form.microMarket} onChange={v => f("microMarket", v)} options={MICRO_MARKETS} />
          <Label>Segment</Label>
          <Select value={form.segment} onChange={v => f("segment", v)} options={SEGMENTS} />
          <Label>Purpose</Label>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
            {PURPOSES.map(p => <ToggleChip key={p} label={p} active={form.purpose.includes(p)} onClick={() => toggle("purpose", p)} />)}
          </div>
          <Label>Non-Negotiables</Label>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
            {NON_NEG_OPTIONS.map(n => <ToggleChip key={n} label={n} active={form.nonNeg.includes(n)} onClick={() => toggle("nonNeg", n)} />)}
          </div>
          <Label>Buyer Concerns (Advisor Note)</Label>
          <textarea value={form.concerns} onChange={e => f("concerns", e.target.value)} placeholder="e.g. Worried about delays. First-time buyer. Needs clear possession timeline." rows={3}
            style={{ width: "100%", background: COLORS.surface2, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: "10px 14px", color: COLORS.text, fontSize: 13, fontFamily: "'DM Sans', sans-serif", resize: "vertical", marginBottom: 20 }} />
          <button className="gold-btn" onClick={() => { setSubmitted(true); setSelected([]); }} style={{ width: "100%", background: COLORS.gold, border: "none", borderRadius: 8, padding: "13px", color: "#000", fontSize: 14, fontWeight: 600, fontFamily: "'DM Sans', sans-serif", cursor: "pointer" }}>
            Find Matching Projects →
          </button>
          {submitted && <button onClick={() => { setSubmitted(false); setForm({ name: "", phone: "", budget: "", microMarket: "All", segment: "All", purpose: [], bedrooms: [], nonNeg: [], concerns: "" }); setSelected([]); }} style={{ width: "100%", marginTop: 8, background: "none", border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: "10px", color: COLORS.textMuted, fontSize: 13, fontFamily: "'DM Sans', sans-serif", cursor: "pointer" }}>Reset</button>}
        </div>

        {/* RESULTS */}
        {submitted && (
          <div>
            {form.concerns && (
              <div style={{ background: "#1A1500", border: `1px solid ${COLORS.goldDim}`, borderRadius: 10, padding: "12px 18px", marginBottom: 16, display: "flex", gap: 10, alignItems: "flex-start" }}>
                <span style={{ color: COLORS.gold, fontSize: 16 }}>⚠</span>
                <div><span style={{ color: COLORS.gold, fontSize: 12, fontWeight: 600 }}>BUYER CONCERN ON FILE — </span><span style={{ fontSize: 13, color: "#CCC" }}>{form.concerns}</span></div>
              </div>
            )}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
              <div style={{ fontSize: 13, color: COLORS.textMuted }}>{filtered.length} projects matched · Select up to 3 for comparison</div>
              {selected.length > 0 && <div style={{ fontSize: 13, color: COLORS.gold }}>{selected.length} selected</div>}
            </div>
            {filtered.length === 0 ? (
              <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 48, textAlign: "center", color: COLORS.textMuted }}>No projects match these criteria.<br />Try widening budget or micro-market.</div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {filtered.map(p => <ProjectCard key={p.id} project={p} selected={selected.includes(p.id)} onSelect={() => toggleSelect(p.id)} />)}
              </div>
            )}
            {selected.length >= 2 && (
              <div style={{ marginTop: 20, background: `linear-gradient(135deg, #1A1500, #111)`, border: `1px solid ${COLORS.gold}`, borderRadius: 12, padding: "20px 24px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div>
                  <div style={{ fontSize: 13, color: COLORS.gold, fontWeight: 600, marginBottom: 4 }}>Shortlist ready — {selected.length} projects selected</div>
                  <div style={{ fontSize: 12, color: COLORS.textMuted }}>{filtered.filter(p => selected.includes(p.id)).map(p => p.name).join(" · ")}</div>
                </div>
                <div style={{ fontSize: 12, color: COLORS.textMuted }}>Use True Cost Calculator tab →</div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
            <div style={{ width: 20, height: 20, borderRadius: 4, border: `2px solid ${selected ? COLORS.gold : COLORS.border}`, background: selected ? COLORS.gold : "transparent", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
              {selected && <span style={{ color: "#000", fontSize: 12, fontWeight: 700 }}>✓</span>}

            <span style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 18, fontWeight: 600, color: COLORS.text }}>{p.name}</span>
            <span className="pill" style={{ background: `${ratingColor(p.rating)}22`, color: ratingColor(p.rating), border: `1px solid ${ratingColor(p.rating)}44` }}>{p.rating}</span>
            {p.flags.red > 0 && <span className="pill" style={{ background: "#C0392B22", color: COLORS.red, border: `1px solid ${COLORS.red}44` }}>🔴 {p.flags.red} RED</span>}

        <Metric label="Rental/sft" value={p.rentalYield > 0 ? `₹${p.rentalYield}/mo` : "N/A (Plot)"} />

        <div style={{ marginLeft: 30, marginTop: 12, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>

// ─── CALCULATOR ───────────────────────────────────────────────────────────────
function CalculatorTab() {
  const emptyProj = {
    name: "", sizeSft: "", psf: "", handoverMonths: "", gst: false,
    loanPct: 80, interestRate: 8.5, paymentPlan: "Construction-linked",
    rentalYield: "", rentalGrowth: 5,
    subventionMonths: "", disbursementAtSubventionEnd: 85,
  };
  const [projects, setProjects] = useState([{ ...emptyProj, id: "A" }, { ...emptyProj, id: "B" }]);
  const [results, setResults] = useState(null);

  const update = (id, key, val) => setProjects(ps => ps.map(p => p.id === id ? { ...p, [key]: val } : p));

  const calculate = () => {
    const calcs = projects.map(p => {
      const size = parseFloat(p.sizeSft) || 0;
      const psf = parseFloat(p.psf) || 0;
      const months = parseFloat(p.handoverMonths) || 0;
      const gstRate = p.gst ? 0.05 : 0;
      const loanPct = parseFloat(p.loanPct) / 100;
      const rate = parseFloat(p.interestRate) / 100;
      const rental = parseFloat(p.rentalYield) || 0;
      const growth = parseFloat(p.rentalGrowth) / 100;

      const baseCost = (size * psf) / 1e7;
      const gstAmount = baseCost * gstRate;
      const totalCost = baseCost + gstAmount;
      const loanAmt = totalCost * loanPct;

      // Pre-EMI interest calculation — three plan types
      let preEmiInterest = 0;
      let builderPaysInterest = 0;
      let buyerExposureMonths = 0;
      let subventionNote = "";

      if (p.paymentPlan === "Subvention") {
        const subMonths = parseFloat(p.subventionMonths) || 0;
        const disbPct = parseFloat(p.disbursementAtSubventionEnd) / 100;
        buyerExposureMonths = Math.max(0, months - subMonths);

        // Builder pays interest on avg 50% of loan during subvention period
        builderPaysInterest = loanAmt * rate * 0.50 * (subMonths / 12);

        // Buyer pays interest on disbPct% of loan for remaining exposure period
        preEmiInterest = loanAmt * disbPct * rate * (buyerExposureMonths / 12);

        subventionNote = subMonths > 0
          ? `Builder covers ${subMonths}M · You pay ${buyerExposureMonths}M on ${p.disbursementAtSubventionEnd}% disbursed loan`
          : "Enter subvention months above";
      } else {
        const avgDisbursed = p.paymentPlan === "Construction-linked" ? 0.55 : 0.65;
        preEmiInterest = loanAmt * rate * avgDisbursed * (months / 12);
        buyerExposureMonths = months;
      }

      // Rental income over 4 years
      const totalMonths = 48;
      let totalRental = 0;
      if (rental > 0) {
        let currentRental = (rental * size) / 1e5;
        let yearStart = months;
        for (let yr = 0; yr < 4; yr++) {
          const yearMonthsAvail = Math.min(12, Math.max(0, totalMonths - yearStart));
          totalRental += currentRental * yearMonthsAvail;
          currentRental *= (1 + growth);
          yearStart += 12;
          if (yearStart >= totalMonths) break;
        }
      }

      const effectiveCost = (totalCost * 100) + (preEmiInterest * 100) - totalRental;
      return {
        name: p.name || `Project ${p.id}`,
        baseCost, gstAmount, totalCost,
        preEmiInterest, builderPaysInterest,
        totalRental, effectiveCost,
        months, paymentPlan: p.paymentPlan,
        subventionMonths: parseFloat(p.subventionMonths) || 0,
        buyerExposureMonths, subventionNote,
        disbursementAtSubventionEnd: p.disbursementAtSubventionEnd,
      };
    });
    setResults(calcs);
  };

  const winner = results ? (results[0].effectiveCost < results[1].effectiveCost ? 0 : 1) : null;
  const saving = results ? Math.abs(results[0].effectiveCost - results[1].effectiveCost) : 0;

  return (
    <div>
      <SectionHeader title="True Cost Calculator" subtitle="Compare real 4-year economic cost — sticker price vs actual cost of ownership" />
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 24 }}>
        {projects.map(p => (
          <div key={p.id} style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 24 }}>
            <div style={{ fontSize: 13, color: COLORS.gold, fontWeight: 600, marginBottom: 16, display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ background: COLORS.gold, color: "#000", borderRadius: 4, width: 22, height: 22, display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700 }}>{p.id}</span>
              PROJECT {p.id}
            </div>
            <Label>Project Name</Label>
            <Input value={p.name} onChange={v => update(p.id, "name", v)} placeholder="e.g. Lansum El Palacio" />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <div><Label>Size (sft)</Label><Input value={p.sizeSft} onChange={v => update(p.id, "sizeSft", v)} placeholder="2800" type="number" /></div>
              <div><Label>PSF (₹)</Label><Input value={p.psf} onChange={v => update(p.id, "psf", v)} placeholder="8200" type="number" /></div>
              <div><Label>Handover (months)</Label><Input value={p.handoverMonths} onChange={v => update(p.id, "handoverMonths", v)} placeholder="40" type="number" /></div>
              <div><Label>Loan %</Label><Input value={p.loanPct} onChange={v => update(p.id, "loanPct", v)} placeholder="80" type="number" /></div>
              <div><Label>Interest Rate %</Label><Input value={p.interestRate} onChange={v => update(p.id, "interestRate", v)} placeholder="8.5" type="number" /></div>
              <div><Label>Rental (₹/sft/mo)</Label><Input value={p.rentalYield} onChange={v => update(p.id, "rentalYield", v)} placeholder="19" type="number" /></div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <div>
                <Label>Payment Plan</Label>
                <Select value={p.paymentPlan} onChange={v => update(p.id, "paymentPlan", v)} options={["Construction-linked", "Time-linked", "Subvention"]} />
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 18 }}>
                <input type="checkbox" checked={p.gst} onChange={e => update(p.id, "gst", e.target.checked)} style={{ width: 16, height: 16, accentColor: COLORS.gold }} id={`gst-${p.id}`} />
                <label htmlFor={`gst-${p.id}`} style={{ fontSize: 13, color: COLORS.textMuted, cursor: "pointer" }}>GST Applicable (5%)</label>
              </div>
            </div>

            {/* SUBVENTION FIELDS — slide in when selected */}
            {p.paymentPlan === "Subvention" && (
              <div style={{ background: "#0F1A0F", border: `1px solid #2A5A2A`, borderRadius: 10, padding: 16, marginTop: 4, marginBottom: 8 }}>
                <div style={{ fontSize: 11, color: "#5AFF8A", fontWeight: 600, marginBottom: 12, letterSpacing: 1 }}>SUBVENTION SCHEME DETAILS</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <div>
                    <Label>Builder Covers Interest For</Label>
                    <Input value={p.subventionMonths} onChange={v => update(p.id, "subventionMonths", v)} placeholder="24" type="number" />
                    <div style={{ fontSize: 11, color: "#555", marginTop: -12, marginBottom: 8 }}>months from booking</div>
                  </div>
                  <div>
                    <Label>Disbursement at Subvention End %</Label>
                    <Input value={p.disbursementAtSubventionEnd} onChange={v => update(p.id, "disbursementAtSubventionEnd", v)} placeholder="85" type="number" />
                    <div style={{ fontSize: 11, color: "#555", marginTop: -12, marginBottom: 8 }}>% of loan already drawn</div>
                  </div>
                </div>
                {p.subventionMonths && p.handoverMonths && (
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                    <div style={{ background: "#0A2A0A", borderRadius: 8, padding: "10px 14px", textAlign: "center" }}>
                      <div style={{ fontSize: 10, color: "#5AFF8A", marginBottom: 4 }}>BUILDER PAYS</div>
                      <div style={{ fontSize: 18, fontWeight: 700, color: "#5AFF8A" }}>{p.subventionMonths}M</div>
                      <div style={{ fontSize: 10, color: "#555" }}>Zero EMI for buyer</div>
                    </div>
                    <div style={{ background: "#2A1A0A", borderRadius: 8, padding: "10px 14px", textAlign: "center" }}>
                      <div style={{ fontSize: 10, color: COLORS.amber, marginBottom: 4 }}>YOU PAY</div>
                      <div style={{ fontSize: 18, fontWeight: 700, color: COLORS.amber }}>{Math.max(0, parseFloat(p.handoverMonths) - parseFloat(p.subventionMonths))}M</div>
                      <div style={{ fontSize: 10, color: "#555" }}>on {p.disbursementAtSubventionEnd}% loan disbursed</div>
                    </div>
                  </div>
                )}
                <div style={{ marginTop: 12, fontSize: 11, color: "#666", lineHeight: 1.5 }}>
                  ⚠ Advisor note: Subvention units are typically priced 8–12% higher. Run the full calculation to check if the "free EMI" period actually saves money vs a lower-priced construction-linked unit.
                </div>
              </div>
            )}
          </div>
        ))}
      </div>

      <button className="gold-btn" onClick={calculate} style={{ width: "100%", background: COLORS.gold, border: "none", borderRadius: 10, padding: "15px", color: "#000", fontSize: 15, fontWeight: 700, fontFamily: "'DM Sans', sans-serif", cursor: "pointer", marginBottom: 24 }}>
        Calculate True 4-Year Cost →
      </button>

      {results && (
        <div>
          {/* Headline */}
          <div style={{ background: `linear-gradient(135deg, #1A1500, #0F0F0F)`, border: `2px solid ${COLORS.gold}`, borderRadius: 14, padding: "24px 32px", textAlign: "center", marginBottom: 24 }}>
            <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 14, color: COLORS.textMuted, marginBottom: 8, letterSpacing: 2, textTransform: "uppercase" }}>True Cost Verdict</div>
            <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 32, fontWeight: 600, color: COLORS.gold }}>
              {results[winner].name} costs ₹{saving.toFixed(1)}L less over 4 years
            </div>
            <div style={{ fontSize: 13, color: COLORS.textMuted, marginTop: 8 }}>
              After accounting for pre-EMI interest, GST differential, and rental opportunity cost
            </div>
          </div>

          {/* Breakdown */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
            {results.map((r, i) => (
              <div key={i} style={{ background: COLORS.surface, border: `2px solid ${i === winner ? COLORS.gold : COLORS.border}`, borderRadius: 12, padding: 24, position: "relative" }}>
                {i === winner && <div style={{ position: "absolute", top: -12, left: "50%", transform: "translateX(-50%)", background: COLORS.gold, color: "#000", fontSize: 11, fontWeight: 700, padding: "3px 14px", borderRadius: 20 }}>LOWER TRUE COST</div>}
                <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 20, fontWeight: 600, marginBottom: 4, color: COLORS.text }}>{r.name}</div>
                <div style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 20 }}>{r.paymentPlan}{r.paymentPlan === "Subvention" ? ` · ${r.subventionMonths}M builder-covered` : ""}</div>

                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  <CalcRow label="Base Acquisition Cost" value={`₹${(r.baseCost * 100).toFixed(2)}L`} />
                  <CalcRow label="GST (if applicable)" value={r.gstAmount > 0 ? `+ ₹${(r.gstAmount * 100).toFixed(2)}L` : "Nil"} highlight={r.gstAmount > 0} />
                  <CalcRow label="Total Acquisition" value={`₹${(r.totalCost * 100).toFixed(2)}L`} bold />

                  <div style={{ borderTop: `1px dashed ${COLORS.border}`, margin: "4px 0" }} />

                  {r.paymentPlan === "Subvention" && r.subventionMonths > 0 ? (
                    <>
                      <CalcRow
                        label={`Builder pays interest (${r.subventionMonths}M)`}
                        value={`₹${(r.builderPaysInterest * 100).toFixed(2)}L absorbed`}
                        positive
                      />
                      <CalcRow
                        label={`Your pre-EMI (${r.buyerExposureMonths}M on ${r.disbursementAtSubventionEnd}% loan)`}
                        value={r.preEmiInterest > 0 ? `+ ₹${(r.preEmiInterest * 100).toFixed(2)}L` : "Nil"}
                        highlight={r.preEmiInterest > 0}
                      />
                      <div style={{ background: "#1A1200", border: `1px solid ${COLORS.goldDim}`, borderRadius: 8, padding: "10px 14px" }}>
                        <div style={{ fontSize: 11, color: COLORS.gold, marginBottom: 4 }}>SUBVENTION REALITY CHECK</div>
                        <div style={{ fontSize: 11, color: "#AAA", lineHeight: 1.5 }}>
                          Builder absorbed ₹{(r.builderPaysInterest * 100).toFixed(1)}L of interest but typically recovers this via higher PSF pricing. Verify PSF vs comparable construction-linked units.
                        </div>
                      </div>
                    </>
                  ) : (
                    <CalcRow
                      label={`Pre-EMI Interest (${r.months}M · ${r.paymentPlan})`}
                      value={`+ ₹${(r.preEmiInterest * 100).toFixed(2)}L`}
                      highlight={r.preEmiInterest > 0}
                    />
                  )}

                  <CalcRow
                    label="Rental Income (4-year, 5% growth)"
                    value={r.totalRental > 0 ? `− ₹${r.totalRental.toFixed(2)}L` : "− Nil"}
                    positive={r.totalRental > 0}
                  />

                  <div style={{ borderTop: `1px solid ${COLORS.border}`, margin: "4px 0" }} />
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 13, color: COLORS.gold, fontWeight: 600 }}>Net True Cost</span>
                    <span style={{ fontSize: 22, fontWeight: 700, color: i === winner ? COLORS.green : COLORS.text, fontFamily: "'Cormorant Garamond', serif" }}>₹{r.effectiveCost.toFixed(2)}L</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 16, fontSize: 11, color: "#444", textAlign: "center" }}>
            Rental growth at 5% p.a. · Pre-EMI on stage-wise disbursement curve · Subvention interest computed on actual buyer exposure window · Indicative only — validate with bank.
          </div>
        </div>
      )}
    </div>
  );
}

function CalcRow({ label, value, highlight, positive, bold }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <span style={{ fontSize: 12, color: COLORS.textMuted }}>{label}</span>
      <span style={{ fontSize: 13, fontWeight: bold ? 700 : 500, color: positive ? COLORS.green : highlight ? COLORS.amber : COLORS.text }}>{value}</span>
    </div>
  );
}

// ─── SHARED UI COMPONENTS ────────────────────────────────────────────────────
function SectionHeader({ title, subtitle }) {
  return (
    <div style={{ marginBottom: 28 }}>
      <h1 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 30, fontWeight: 600, color: COLORS.text, marginBottom: 6 }}>{title}</h1>
      <p style={{ fontSize: 13, color: COLORS.textMuted }}>{subtitle}</p>
      <div style={{ height: 2, background: `linear-gradient(90deg, ${COLORS.gold}, transparent)`, marginTop: 14, width: 120 }} />
    </div>
  );
}

function Label({ children }) {
  return <div style={{ fontSize: 11, color: COLORS.textMuted, fontWeight: 600, marginBottom: 6, letterSpacing: 0.5, textTransform: "uppercase" }}>{children}</div>;
}

function Input({ value, onChange, placeholder, type = "text" }) {
  return (
    <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
      style={{ width: "100%", background: COLORS.surface2, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: "10px 14px", color: COLORS.text, fontSize: 13, marginBottom: 16, fontFamily: "'DM Sans', sans-serif", display: "block" }} />
  );
}

function Select({ value, onChange, options }) {
  return (
    <select value={value} onChange={e => onChange(e.target.value)}
      style={{ width: "100%", background: COLORS.surface2, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: "10px 14px", color: COLORS.text, fontSize: 13, marginBottom: 16, fontFamily: "'DM Sans', sans-serif" }}>
      {options.map(o => <option key={o} value={o}>{o}</option>)}
    </select>
  );
}

function ToggleChip({ label, active, onClick }) {
  return (
    <button onClick={onClick} style={{ padding: "5px 13px", borderRadius: 20, border: `1px solid ${active ? COLORS.gold : COLORS.border}`, background: active ? `${COLORS.gold}20` : "none", color: active ? COLORS.gold : COLORS.textMuted, fontSize: 12, cursor: "pointer", fontFamily: "'DM Sans', sans-serif", transition: "all 0.15s" }}>
      {label}
    </button>
  );
}

function Metric({ label, value }) {
  return (
    <div>
      <div style={{ fontSize: 10, color: COLORS.textMuted }}>{label}</div>
      <div style={{ fontSize: 12, color: COLORS.text, fontWeight: 500 }}>{value}</div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
