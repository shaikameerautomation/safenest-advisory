<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafeNest — True Cost Calculator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body style="margin:0;padding:0;background:#111;">
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

const C = {
  gold: "#C9A84C", goldDim: "#6A5020",
  s1: "#1a1a1a", s2: "#242424",
  border: "#333", text: "#e8e8e8", muted: "#888",
  amber: "#E67E22", green: "#27AE60",
};

const inp = {
  width: "100%", background: C.s2, border: `1px solid ${C.border}`,
  borderRadius: 7, padding: "9px 12px", color: C.text, fontSize: 13,
  marginBottom: 12, fontFamily: "inherit", display: "block", outline: "none", boxSizing: "border-box",
};
const lbl = {
  fontSize: 10, color: C.muted, fontWeight: 600, letterSpacing: 0.5,
  textTransform: "uppercase", marginBottom: 5, display: "block",
};

function Field({ label, children }) {
  return <div style={{ marginBottom: 2 }}><span style={lbl}>{label}</span>{children}</div>;
}

function Row({ label, value, positive, highlight, bold, sub }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "5px 0", borderBottom: `1px solid ${C.border}` }}>
      <div>
        <span style={{ fontSize: 12, color: C.muted }}>{label}</span>
        {sub && <div style={{ fontSize: 10, color: "#555" }}>{sub}</div>}
      </div>
      <span style={{ fontSize: 13, fontWeight: bold ? 600 : 400, color: positive ? C.green : highlight ? C.amber : C.text, flexShrink: 0, marginLeft: 8 }}>{value}</span>
    </div>
  );
}

const EMPTY = {
  name: "", allInPrice: "", handoverMonths: "", gst: false,
  loanPct: 80, interestRate: 8.5, paymentPlan: "Construction-linked",
  rentalSft: "", rentalGrowth: 5, sizeSft: "",
  subventionMonths: "", disbPct: 85,
};

// ✅ ProjectForm outside parent — fixes remount/focus loss bug
function ProjectForm({ p, onChange }) {
  const u = (k, v) => onChange(k, v);
  return (
    <div style={{ background: C.s1, border: `1px solid ${C.border}`, borderRadius: 10, padding: 20 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
        <span style={{ background: C.gold, color: "#000", borderRadius: 4, width: 22, height: 22, display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700 }}>{p.id}</span>
        <span style={{ fontSize: 12, color: C.gold, fontWeight: 600 }}>PROJECT {p.id}</span>
      </div>
      <Field label="Project Name">
        <input style={inp} value={p.name} onChange={e => u("name", e.target.value)} placeholder="e.g. Lansum El Palacio" />
      </Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <Field label="All-Inclusive Price (₹ Cr)">
          <input style={inp} type="number" value={p.allInPrice} onChange={e => u("allInPrice", e.target.value)} placeholder="1.85" />
        </Field>
        <Field label="Unit Size (sft)">
          <input style={inp} type="number" value={p.sizeSft} onChange={e => u("sizeSft", e.target.value)} placeholder="2100" />
        </Field>
        <Field label="Handover (months)">
          <input style={inp} type="number" value={p.handoverMonths} onChange={e => u("handoverMonths", e.target.value)} placeholder="24" />
        </Field>
        <Field label="Loan %">
          <input style={inp} type="number" value={p.loanPct} onChange={e => u("loanPct", e.target.value)} placeholder="80" />
        </Field>
        <Field label="Interest Rate %">
          <input style={inp} type="number" value={p.interestRate} onChange={e => u("interestRate", e.target.value)} placeholder="8.5" />
        </Field>
        <Field label="Rental ₹/sft/month">
          <input style={inp} type="number" value={p.rentalSft} onChange={e => u("rentalSft", e.target.value)} placeholder="19" />
        </Field>
      </div>
      <Field label="Payment Plan">
        <select style={{ ...inp, marginBottom: 10 }} value={p.paymentPlan} onChange={e => u("paymentPlan", e.target.value)}>
          <option>Construction-linked</option>
          <option>Time-linked</option>
          <option>Subvention</option>
        </select>
      </Field>
      {p.paymentPlan === "Subvention" && (
        <div style={{ background: "#0F1A0F", border: "1px solid #2A5A2A", borderRadius: 8, padding: 14, marginTop: 4 }}>
          <div style={{ fontSize: 10, color: "#5AFF8A", fontWeight: 600, marginBottom: 10 }}>SUBVENTION DETAILS</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <Field label="Builder covers (months)">
              <input style={inp} type="number" value={p.subventionMonths} onChange={e => u("subventionMonths", e.target.value)} placeholder="24" />
            </Field>
            <Field label="Disbursement at switchover %">
              <input style={inp} type="number" value={p.disbPct} onChange={e => u("disbPct", e.target.value)} placeholder="85" />
            </Field>
          </div>
          {p.subventionMonths && p.handoverMonths && (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              <div style={{ background: "#0A2A0A", borderRadius: 7, padding: "8px 12px", textAlign: "center" }}>
                <div style={{ fontSize: 9, color: "#5AFF8A", marginBottom: 3 }}>BUILDER PAYS</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: "#5AFF8A" }}>{p.subventionMonths}M</div>
                <div style={{ fontSize: 9, color: "#555" }}>Zero EMI for buyer</div>
              </div>
              <div style={{ background: "#2A1A0A", borderRadius: 7, padding: "8px 12px", textAlign: "center" }}>
                <div style={{ fontSize: 9, color: C.amber, marginBottom: 3 }}>YOU PAY</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: C.amber }}>{Math.max(0, parseFloat(p.handoverMonths) - parseFloat(p.subventionMonths))}M</div>
                <div style={{ fontSize: 9, color: "#555" }}>on {p.disbPct}% loan disbursed</div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function TrueCostCalculator() {
  const [A, setA] = useState({ ...EMPTY, id: "A" });
  const [B, setB] = useState({ ...EMPTY, id: "B" });
  const [result, setResult] = useState(null);

  const uA = (k, v) => setA(p => ({ ...p, [k]: v }));
  const uB = (k, v) => setB(p => ({ ...p, [k]: v }));

  const calc = (p) => {
    const price = parseFloat(p.allInPrice) || 0;
    const months = parseFloat(p.handoverMonths) || 0;
    const loanPct = parseFloat(p.loanPct) / 100;
    const rate = parseFloat(p.interestRate) / 100;
    const size = parseFloat(p.sizeSft) || 0;
    const rental = parseFloat(p.rentalSft) || 0;
    const growth = parseFloat(p.rentalGrowth) / 100;
    const loanAmt = price * loanPct;

    let preEmi = 0, builderAbsorbs = 0, buyerMonths = months;
    if (p.paymentPlan === "Subvention") {
      const subM = parseFloat(p.subventionMonths) || 0;
      const dPct = parseFloat(p.disbPct) / 100;
      buyerMonths = Math.max(0, months - subM);
      builderAbsorbs = loanAmt * rate * 0.5 * (subM / 12);
      preEmi = loanAmt * dPct * rate * (buyerMonths / 12);
    } else {
      const avg = p.paymentPlan === "Construction-linked" ? 0.55 : 0.65;
      preEmi = loanAmt * rate * avg * (months / 12);
    }

    let totalRental = 0;
    if (rental > 0 && size > 0) {
      let rpm = (rental * size) / 1e5;
      let yr = months;
      for (let i = 0; i < 4; i++) {
        const av = Math.min(12, Math.max(0, 48 - yr));
        totalRental += rpm * av;
        rpm *= (1 + growth);
        yr += 12;
        if (yr >= 48) break;
      }
    }

    const netCost = (price * 100) + (preEmi * 100) - totalRental;
    return {
      name: p.name || `Project ${p.id}`, price, loanAmt, preEmi, builderAbsorbs,
      totalRental, netCost, months, paymentPlan: p.paymentPlan,
      subventionMonths: parseFloat(p.subventionMonths) || 0, buyerMonths, disbPct: p.disbPct,
    };
  };

  const run = () => setResult([calc(A), calc(B)]);
  const winner = result ? (result[0].netCost <= result[1].netCost ? 0 : 1) : null;
  const saving = result ? Math.abs(result[0].netCost - result[1].netCost) : 0;

  return (
    <div style={{ background: "#111", minHeight: "100vh", fontFamily: "'DM Sans','Segoe UI',sans-serif", color: C.text, padding: 24 }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Cormorant+Garamond:wght@400;600&display=swap'); *{box-sizing:border-box;margin:0;padding:0;}`}</style>

      <div style={{ marginBottom: 24 }}>
        <div style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: 26, fontWeight: 600, marginBottom: 4 }}>True Cost Calculator</div>
        <div style={{ fontSize: 12, color: C.muted }}>4-year net cost · All-inclusive pricing · Pre-EMI + Rental opportunity cost</div>
        <div style={{ height: 2, background: `linear-gradient(90deg,${C.gold},transparent)`, marginTop: 10, width: 80 }} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
        <ProjectForm p={A} onChange={uA} />
        <ProjectForm p={B} onChange={uB} />
      </div>

      <button onClick={run} style={{ width: "100%", background: C.gold, border: "none", borderRadius: 8, padding: 13, color: "#000", fontSize: 14, fontWeight: 700, fontFamily: "inherit", cursor: "pointer", marginBottom: 20 }}>
        Calculate True 4-Year Cost →
      </button>

      {result && (
        <div>
          <div style={{ background: "#1A1500", border: `2px solid ${C.gold}`, borderRadius: 12, padding: "18px 24px", textAlign: "center", marginBottom: 18 }}>
            <div style={{ fontSize: 10, color: C.muted, letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>True Cost Verdict — 4 Years</div>
            <div style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: 26, fontWeight: 600, color: C.gold }}>
              {result[winner].name} costs ₹{saving.toFixed(1)}L less over 4 years
            </div>
            <div style={{ fontSize: 11, color: C.muted, marginTop: 4 }}>After pre-EMI interest and rental opportunity cost</div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            {result.map((r, i) => (
              <div key={i} style={{ background: C.s1, border: `2px solid ${i === winner ? C.gold : C.border}`, borderRadius: 10, padding: 20, position: "relative" }}>
                {i === winner && <div style={{ position: "absolute", top: -10, left: "50%", transform: "translateX(-50%)", background: C.gold, color: "#000", fontSize: 10, fontWeight: 700, padding: "2px 12px", borderRadius: 20, whiteSpace: "nowrap" }}>LOWER TRUE COST</div>}
                <div style={{ fontSize: 17, fontWeight: 600, marginBottom: 3 }}>{r.name}</div>
                <div style={{ fontSize: 10, color: C.muted, marginBottom: 14 }}>{r.paymentPlan}{r.paymentPlan === "Subvention" ? ` · ${r.subventionMonths}M builder-covered` : ""}</div>
                <Row label="All-Inclusive Price" value={`₹${(r.price * 100).toFixed(2)}L`} bold />
                <Row label="Loan Amount" value={`₹${(r.loanAmt * 100).toFixed(2)}L`} sub="Bank disburses in stages" />
                <div style={{ margin: "8px 0 3px", fontSize: 9, color: C.gold, fontWeight: 600, letterSpacing: 1 }}>PRE-EMI INTEREST</div>
                {r.paymentPlan === "Subvention" && r.subventionMonths > 0 ? (
                  <>
                    <Row label={`Builder absorbs (${r.subventionMonths}M)`} value={`₹${(r.builderAbsorbs * 100).toFixed(2)}L`} positive sub="Priced into PSF — not actually free" />
                    <Row label={`Your exposure (${r.buyerMonths}M on ${r.disbPct}% loan)`} value={r.preEmi > 0 ? `+ ₹${(r.preEmi * 100).toFixed(2)}L` : "Nil"} highlight={r.preEmi > 0} />
                  </>
                ) : (
                  <Row label={`Pre-EMI (${r.months}M · ${r.paymentPlan})`} value={`+ ₹${(r.preEmi * 100).toFixed(2)}L`} highlight={r.preEmi > 0} />
                )}
                <div style={{ margin: "8px 0 3px", fontSize: 9, color: C.gold, fontWeight: 600, letterSpacing: 1 }}>RENTAL OPPORTUNITY</div>
                <Row label="4-year rental income" value={r.totalRental > 0 ? `− ₹${r.totalRental.toFixed(2)}L` : "− Nil"} positive={r.totalRental > 0} sub="5% annual growth" />
                <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: 12, color: C.gold, fontWeight: 600 }}>Net True Cost</span>
                  <span style={{ fontSize: 24, fontWeight: 700, color: i === winner ? C.green : C.text, fontFamily: "'Cormorant Garamond',serif" }}>₹{r.netCost.toFixed(1)}L</span>
                </div>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 12, fontSize: 10, color: "#444", textAlign: "center" }}>
            All-inclusive = base + floor rise + PLC + parking + GST + registration · Pre-EMI on stage-wise curve · Rental at 5% p.a. · Indicative only
          </div>
        </div>
      )}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<TrueCostCalculator/>);
  </script>
</body>
</html>
